<svg width="186" height="40" viewBox="0 0 186 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CostTracker">
  <style>
    .vlt-s { stroke: #6D3DE0; }
    .vlt-f { fill: #6D3DE0; transform-box: fill-box; transform-origin: center; }
    .ink   { fill: #52525B; }
    @media (prefers-color-scheme: dark) {
      .vlt-s { stroke: #8B5CF6; }
      .vlt-f { fill: #8B5CF6; }
      .ink   { fill: #A1A1AA; }
    }
    @media (prefers-reduced-motion: no-preference) {
      .vlt-s { animation: ct-draw 0.9s cubic-bezier(0.4, 0, 0.2, 1) both; }
      .ct-node { animation: ct-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.55s both; }
      .ct-word { animation: ct-rise 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.35s both; }
    }
    @keyframes ct-draw { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
    @keyframes ct-pop  { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }
    @keyframes ct-rise { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }
  </style>
  <g transform="translate(0 4)">
    <path class="vlt-s" d="M 22.42 23.13 A 9.6 9.6 0 1 1 21.7 9.9" fill="none" stroke-width="3.8" stroke-linecap="round" pathLength="100" stroke-dasharray="100"/>
    <circle class="vlt-f ct-node" cx="23.6" cy="7.7" r="2.9"/>
  </g>
  <text class="ct-word" x="41" y="28" font-family="'DM Sans','Segoe UI',system-ui,-apple-system,sans-serif" font-size="23" font-weight="700" letter-spacing="-0.6">
    <tspan class="vlt-f">Cost</tspan><tspan class="ink">Tracker</tspan>
  </text>
</svg>
